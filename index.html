<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려동물 동반 업소</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }

.container { max-width:600px; margin:auto; padding:15px; }

h1 { font-size:1.2rem; text-align:center; }

.search-box { display:flex; gap:5px; margin-bottom:10px; }
input { flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; }

.btn { padding:10px; border:none; border-radius:8px; background:#03C75A; color:#fff; }

.card {
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.name { font-weight:bold; margin-bottom:5px; }
.addr { font-size:13px; color:#666; margin-bottom:5px; }

.bottom {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tel { color:#03C75A; text-decoration:none; font-weight:bold; }

.map { background:#03C75A; color:#fff; padding:5px 10px; border-radius:6px; text-decoration:none; font-size:12px; }

.distance { font-size:12px; color:red; }

#loading { text-align:center; padding:20px; }
</style>
</head>

<body>

<div class="container">
<h1>🐾 반려동물 동반 업소 (<span id="count"></span>)</h1>

<div class="search-box">
<input id="search" placeholder="검색">
<button class="btn" onclick="filter()">검색</button>
</div>

<div id="list"></div>
<div id="loading">불러오는 중...</div>

</div>

<script>

const URL = 'https://script.google.com/macros/s/AKfycbwD2nH1LzhZ6aXJP5AGkXcxt1ou0YS1-qEg_MVAcTquH6YIZ2YTeVLa3lxgg7Lspy15Pg/exec';

let data = [];
let view = [];
let page = 0;
const SIZE = 30;

let user = null;


// 위치
function getLoc() {
    return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(p=>{
            user = {lat:p.coords.latitude, lng:p.coords.longitude};
            res();
        },()=>res());
    });
}


// 거리
function dist(a,b,c,d){
    const R=6371;
    const dLat=(c-a)*Math.PI/180;
    const dLon=(d-b)*Math.PI/180;
    const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}


// 렌더
function render() {
    const list = document.getElementById('list');

    const slice = view.slice(page*SIZE,(page+1)*SIZE);

    slice.forEach(r=>{
        const lat=parseFloat(r["위도"]);
        const lng=parseFloat(r["경도"]);

        let d="";
        if(user && lat && lng){
            d = `<div class="distance">${dist(user.lat,user.lng,lat,lng).toFixed(1)}km</div>`;
        }

        list.insertAdjacentHTML('beforeend',`
        <div class="card">
            <div class="name">${r["업소명"]}</div>
            ${d}
            <div class="addr">${r["주소"]}</div>

            <div class="bottom">
                <a class="tel" href="tel:${r["전화번호"]}">${r["전화번호"]||"-"}</a>
                <a class="map" target="_blank"
                href="https://map.naver.com/v5/search/${encodeURIComponent(r["업소명"])}">지도</a>
            </div>
        </div>
        `);
    });

    page++;
}


// 무한스크롤
const observer = new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){
        render();
    }
});

observer.observe(document.getElementById('loading'));


// 데이터 로드
async function load(){
    const res = await fetch(URL);
    data = await res.json();
    view = data;

    document.getElementById('count').innerText=data.length;

    await getLoc();

    render();
}

load();


// 검색
function filter(){
    const v=document.getElementById('search').value.toLowerCase();

    view = data.filter(r=>
        (r["업소명"]||"").toLowerCase().includes(v) ||
        (r["주소"]||"").toLowerCase().includes(v)
    );

    document.getElementById('list').innerHTML="";
    page=0;
    render();
}

</script>

</body>
</html>
