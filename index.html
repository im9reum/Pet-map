<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려동물 동반 업소 리스트</title>

<style>
:root { --naver-green: #03C75A; }
body { font-family: sans-serif; padding: 15px; background: #f8f9fa; margin: 0; }
.container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; }
h1 { text-align: center; font-size: 1.3rem; }

.control-panel { position: sticky; top: 0; background: white; padding: 10px 0; }
.search-box { display: flex; gap: 8px; margin-bottom: 10px; }
#search-input { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #eee; }

.btn-group { display: flex; gap: 5px; }
.btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; }
.btn-primary { background: var(--naver-green); color: white; }
.btn-secondary { background: #eee; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

.map-link { background: var(--naver-green); color: white; padding: 6px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; }
.tel-link { color: #03C75A; font-weight: bold; text-decoration: none; }

.distance-info { font-size: 11px; color: red; display: block; }

#status { text-align: center; padding: 40px; }
</style>
</head>

<body>

<div class="container">
<h1>🐾 반려동물 동반 업소 (<span id="total-count"></span>)</h1>

<div class="control-panel">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="검색" onkeypress="if(event.keyCode==13) filterData()">
        <button class="btn btn-primary" onclick="filterData()">검색</button>
    </div>

    <div class="btn-group">
        <button class="btn btn-secondary" onclick="filterByRadius(5)">주변 5km</button>
        <button class="btn btn-secondary" onclick="resetList()">전체</button>
    </div>
</div>

<div id="status">불러오는 중...</div>

<table id="data-table" style="display:none;">
<thead>
<tr>
<th>업소명</th>
<th>주소</th>
<th>전화</th>
<th>지도</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<button onclick="loadMore()" class="btn btn-secondary" style="width:100%; margin-top:10px;">
더 보기
</button>

</div>

<script>

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwD2nH1LzhZ6aXJP5AGkXcxt1ou0YS1-qEg_MVAcTquH6YIZ2YTeVLa3lxgg7Lspy15Pg/exec';

let masterData = [];
let currentData = [];
let currentPage = 0;
const PAGE_SIZE = 50;
let userCoords = null;


// 거리 계산
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}


// 위치 가져오기
async function getUserLocation() {
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                resolve(true);
            },
            () => resolve(false)
        );
    });
}


// 데이터 로드
async function loadData() {
    const res = await fetch(WEB_APP_URL);
    masterData = await res.json();

    document.getElementById('total-count').innerText = masterData.length;

    renderTable(masterData, true);

    document.getElementById('status').style.display = 'none';
    document.getElementById('data-table').style.display = 'table';
}


// 렌더링
function renderTable(data, reset=true) {
    const tbody = document.getElementById('table-body');

    if (reset) {
        tbody.innerHTML = "";
        currentPage = 0;
        currentData = data;
    }

    const start = currentPage * PAGE_SIZE;
    const slice = currentData.slice(start, start + PAGE_SIZE);

    const html = slice.map(row => {
        const name = row["업소명"] || "";
        const addr = row["주소"] || "";
        const tel = row["전화번호"] || "";

        const lat = parseFloat(row["위도"]);
        const lng = parseFloat(row["경도"]);

        let distText = "";
        if (userCoords && lat && lng) {
            const d = getDistance(userCoords.lat, userCoords.lng, lat, lng);
            distText = `<span class="distance-info">${d.toFixed(1)}km</span>`;
        }

        const telLink = tel ? `<a href="tel:${tel}" class="tel-link">${tel}</a>` : "-";

        const search = encodeURIComponent(name);
        const mapUrl = `https://map.naver.com/v5/search/${search}`;

        return `<tr>
            <td>${name}${distText}</td>
            <td>${addr}</td>
            <td>${telLink}</td>
            <td><a href="${mapUrl}" target="_blank" class="map-link">지도</a></td>
        </tr>`;
    }).join('');

    tbody.insertAdjacentHTML('beforeend', html);
    currentPage++;
}


// 더보기
function loadMore() {
    renderTable(currentData, false);
}


// 검색
function filterData() {
    const val = document.getElementById('search-input').value.toLowerCase();

    const filtered = masterData.filter(r =>
        (r["업소명"]||"").toLowerCase().includes(val) ||
        (r["주소"]||"").toLowerCase().includes(val)
    );

    renderTable(filtered, true);
}


// 초기화
function resetList() {
    renderTable(masterData, true);
}


// 반경 5km + 거리순 정렬
async function filterByRadius(km) {
    if (!userCoords) await getUserLocation();
    if (!userCoords) return;

    let filtered = masterData.map(row => {
        const dist = getDistance(
            userCoords.lat, userCoords.lng,
            parseFloat(row["위도"]), parseFloat(row["경도"])
        );
        return {...row, dist};
    });

    filtered = filtered
        .filter(r => r.dist <= km)
        .sort((a,b) => a.dist - b.dist);

    renderTable(filtered, true);
}


// 시작
loadData();

</script>

</body>
</html>
