<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려동물 동반 업소</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
    margin:0;
    background:#f5f5f5;
    font-size:15px;
}

.container {
    max-width:600px;
    margin:auto;
    padding:16px;
}

h1 {
    font-size:1.3rem;
    text-align:center;
    margin-bottom:12px;
}

.top-bar {
    position: sticky;
    top: 0;
    background: #f5f5f5;
    z-index: 100;
    padding-bottom: 10px;
}

.search-box {
    display:flex;
    gap:8px;
    margin-bottom:10px;
}

input {
    flex:1;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}

.btn {
    padding:14px 16px;
    border:none;
    border-radius:10px;
    background:#03C75A;
    color:#fff;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
}

.btn.gray {
    background:#e0e0e0;
    color:#333;
}

.btn-row {
    display:flex;
    gap:8px;
}

.card {
    background:#fff;
    padding:16px;
    border-radius:14px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.name {
    font-weight:700;
    font-size:16px;
    margin-bottom:6px;
}

.addr {
    font-size:13px;
    color:#666;
    margin-bottom:8px;
    line-height:1.4;
}

.bottom {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tel {
    color:#03C75A;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
}

.map {
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:12px;
}

.map.naver {
    background:#03C75A;
    color:#fff;
}

.map.kakao {
    background:#FEE500;
    color:#000;
    font-weight:600;
}

.distance {
    font-size:12px;
    color:#ff4d4f;
    margin-bottom:5px;
}

#loading {
    text-align:center;
    padding:20px;
    color:#888;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>🐾 반려동물 동반 업소 (<span id="count"></span>)</h1>

<div class="top-bar">
    <div class="search-box">
        <input id="search" placeholder="검색 (업소명/주소)">
        <button class="btn" onclick="filter()">검색</button>
    </div>

    <div class="btn-row">
        <button class="btn gray" onclick="nearby()">📍 내 주변 5km</button>
        <button class="btn gray" onclick="reset()">전체</button>
    </div>
</div>

<div id="list"></div>
<div id="loading">데이터 불러오는 중...</div>

</div>

<script>

const URL = 'https://script.google.com/macros/s/AKfycbwD2nH1LzhZ6aXJP5AGkXcxt1ou0YS1-qEg_MVAcTquH6YIZ2YTeVLa3lxgg7Lspy15Pg/exec';

let data = [];
let view = [];
let page = 0;
const SIZE = 30;
let user = null;


// 지역명 정규화
function normalize(text){
    return text.replace(/특별자치도|특별자치시|광역시|특별시|자치도|자치시/g,"");
}

// 업소명 정제
function cleanName(name){
    return (name || "").replace(/\(.*?\)/g, "").trim();
}

// 주소 정제
function cleanAddress(addr){
    if(!addr) return "";
    const parts = addr.split(" ");
    if(parts.length >= 3) return parts[1] + " " + parts[2];
    if(parts.length >= 2) return parts[0] + " " + parts[1];
    return addr;
}

// 거리 계산
function dist(a,b,c,d){
    const R=6371;
    const dLat=(c-a)*Math.PI/180;
    const dLon=(d-b)*Math.PI/180;
    const x=Math.sin(dLat/2)**2+
        Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// 위치
function getLoc(){
    return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(p=>{
            user={lat:p.coords.latitude,lng:p.coords.longitude};
            res();
        },()=>res());
    });
}

// 렌더
function render(){
    const list=document.getElementById('list');
    const loading=document.getElementById('loading');

    const slice=view.slice(page*SIZE,(page+1)*SIZE);

    if(page === 0 && view.length === 0){
        loading.innerText = "❌ 검색 결과가 없습니다";
        return;
    }

    slice.forEach(r=>{
        const lat=parseFloat(r["위도"]);
        const lng=parseFloat(r["경도"]);

        let d="";
        if(user && lat && lng){
            d=`<div class="distance">${dist(user.lat,user.lng,lat,lng).toFixed(1)}km</div>`;
        }

        const name = cleanName(r["업소명"]);
        const addr = cleanAddress(r["주소"]);
        const keyword = encodeURIComponent(name + " " + addr);

        const naverUrl = `https://map.naver.com/v5/search/${keyword}`;
        const kakaoUrl = `https://map.kakao.com/?q=${keyword}`;

        list.insertAdjacentHTML('beforeend',`
        <div class="card">
            <div class="name">${name}</div>
            ${d}
            <div class="addr">${r["주소"]}</div>

            <div class="bottom">
                <a class="tel" href="tel:${r["전화번호"]||""}">${r["전화번호"]||"-"}</a>

                <div style="display:flex; gap:6px;">
                    <a class="map naver" target="_blank" href="${naverUrl}">네이버지도</a>
                    <a class="map kakao" target="_blank" href="${kakaoUrl}">카카오맵</a>
                </div>
            </div>
        </div>
        `);
    });

    page++;

    if(page*SIZE >= view.length){
        loading.innerText = "✔ 모든 데이터를 불러왔습니다";
    } else {
        loading.innerText = "스크롤하면 더 불러옵니다...";
    }
}

// 무한스크롤
const observer=new IntersectionObserver(e=>{
    if(e[0].isIntersecting){
        if(page*SIZE < view.length){
            render();
        }
    }
});
observer.observe(document.getElementById('loading'));

// 데이터 로드
async function load(){
    try{
        const res=await fetch(URL);
        data=await res.json();
        view=data;

        document.getElementById('count').innerText=data.length;

        await getLoc();

        document.getElementById('loading').innerText="스크롤하면 더 불러옵니다...";
        render();

    }catch(e){
        document.getElementById('loading').innerText="❌ 데이터 로드 실패";
    }
}
load();

// 검색
function filter(){
    const v=normalize(document.getElementById('search').value.toLowerCase());

    view=data.filter(r=>{
        const name=normalize(cleanName(r["업소명"]).toLowerCase());
        const addr=normalize((r["주소"]||"").toLowerCase());
        return name.includes(v)||addr.includes(v);
    });

    document.getElementById('list').innerHTML="";
    page=0;
    render();
}

// 엔터 검색
document.getElementById('search')
.addEventListener('keydown', e=>{
    if(e.key==="Enter") filter();
});

// 초기화
function reset(){
    view=data;
    document.getElementById('list').innerHTML="";
    page=0;
    document.getElementById('loading').innerText="스크롤하면 더 불러옵니다...";
    render();
}

// 내 주변 5km
async function nearby(){
    if(!user) await getLoc();
    if(!user) return;

    let filtered=data.map(r=>{
        const lat=parseFloat(r["위도"]);
        const lng=parseFloat(r["경도"]);
        const d=dist(user.lat,user.lng,lat,lng);
        return {...r,d};
    });

    filtered=filtered
        .filter(r=>r.d<=5)
        .sort((a,b)=>a.d-b.d);

    view=filtered;

    document.getElementById('list').innerHTML="";
    page=0;
    render();
}

</script>

</body>
</html>
