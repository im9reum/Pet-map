<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려동물 동반 업소</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
.container { max-width:600px; margin:auto; padding:15px; }

h1 { font-size:1.2rem; text-align:center; }

.top-bar {
    position: sticky;
    top: 0;
    background: #f5f5f5;
    z-index: 100;
    padding-bottom: 10px;
}

.search-box { display:flex; gap:5px; margin-bottom:8px; }
input { flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; }

.btn { padding:10px; border:none; border-radius:8px; background:#03C75A; color:#fff; cursor:pointer; }
.btn.gray { background:#ddd; color:#333; }

.btn-row { display:flex; gap:5px; }

.card {
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.name { font-weight:bold; margin-bottom:5px; }
.addr { font-size:13px; color:#666; margin-bottom:5px; }

.bottom {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tel { color:#03C75A; text-decoration:none; font-weight:bold; }
.map { background:#03C75A; color:#fff; padding:5px 10px; border-radius:6px; text-decoration:none; font-size:12px; }

.distance { font-size:12px; color:red; }

#loading { text-align:center; padding:20px; color:#888; }
</style>
</head>

<body>

<div class="container">

<h1>🐾 반려동물 동반 업소 (<span id="count"></span>)</h1>

<div class="top-bar">
    <div class="search-box">
        <input id="search" placeholder="검색 (업소명/주소)">
        <button class="btn" onclick="filter()">검색</button>
    </div>

    <div class="btn-row">
        <button class="btn gray" onclick="nearby()">📍 내 주변 5km</button>
        <button class="btn gray" onclick="reset()">전체</button>
    </div>
</div>

<div id="list"></div>
<div id="loading">데이터 불러오는 중...</div>

</div>

<script>

const URL = 'https://script.google.com/macros/s/AKfycbwD2nH1LzhZ6aXJP5AGkXcxt1ou0YS1-qEg_MVAcTquH6YIZ2YTeVLa3lxgg7Lspy15Pg/exec';

let data = [];
let view = [];
let page = 0;
const SIZE = 30;
let user = null;


// 🔥 지역명 정규화 (검색용)
function normalize(text){
    return text
        .replace(/특별자치도|특별자치시|광역시|특별시|자치도|자치시/g,"");
}


// 🔥 업소명 정제 (괄호 제거)
function cleanName(name){
    return (name || "")
        .replace(/\(.*?\)/g, "")
        .trim();
}


// 🔥 주소 정제 (시/구까지만)
function cleanAddress(addr){
    if(!addr) return "";

    const parts = addr.split(" ");

    if(parts.length >= 3){
        return parts[1] + " " + parts[2];
    }

    if(parts.length >= 2){
        return parts[0] + " " + parts[1];
    }

    return addr;
}


// 거리 계산
function dist(a,b,c,d){
    const R=6371;
    const dLat=(c-a)*Math.PI/180;
    const dLon=(d-b)*Math.PI/180;
    const x=Math.sin(dLat/2)**2+
        Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}


// 위치
function getLoc(){
    return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(p=>{
            user={lat:p.coords.latitude,lng:p.coords.longitude};
            res();
        },()=>res());
    });
}


// 렌더
function render(){
    const list=document.getElementById('list');
    const loading=document.getElementById('loading');

    const slice=view.slice(page*SIZE,(page+1)*SIZE);

    if(page === 0 && view.length === 0){
        loading.innerText = "❌ 검색 결과가 없습니다";
        return;
    }

    slice.forEach(r=>{
        const lat=parseFloat(r["위도"]);
        const lng=parseFloat(r["경도"]);

        let d="";
        if(user && lat && lng){
            d=`<div class="distance">${dist(user.lat,user.lng,lat,lng).toFixed(1)}km</div>`;
        }

        // 🔥 지도 URL (정확도 개선)
        const name = cleanName(r["업소명"]);
        const addr = cleanAddress(r["주소"]);
        const mapUrl = `https://map.naver.com/v5/search/${encodeURIComponent(name + " " + addr)}`;

        list.insertAdjacentHTML('beforeend',`
        <div class="card">
            <div class="name">${name}</div>
            ${d}
            <div class="addr">${r["주소"]}</div>

            <div class="bottom">
                <a class="tel" href="tel:${r["전화번호"]||""}">${r["전화번호"]||"-"}</a>
                <a class="map" target="_blank" href="${mapUrl}">지도</a>
            </div>
        </div>
        `);
    });

    page++;

    if(page*SIZE >= view.length){
        loading.innerText = "✔ 모든 데이터를 불러왔습니다";
    } else {
        loading.innerText = "스크롤하면 더 불러옵니다...";
    }
}


// 무한스크롤
const observer=new IntersectionObserver(e=>{
    if(e[0].isIntersecting){
        if(page*SIZE < view.length){
            render();
        }
    }
});
observer.observe(document.getElementById('loading'));


// 데이터 로드
async function load(){
    try{
        const res=await fetch(URL);
        data=await res.json();
        view=data;

        document.getElementById('count').innerText=data.length;

        await getLoc();

        document.getElementById('loading').innerText="스크롤하면 더 불러옵니다...";
        render();

    }catch(e){
        document.getElementById('loading').innerText="❌ 데이터 로드 실패";
    }
}
load();


// 검색
function filter(){
    const v=normalize(document.getElementById('search').value.toLowerCase());

    view=data.filter(r=>{
        const name=normalize(cleanName(r["업소명"]).toLowerCase());
        const addr=normalize((r["주소"]||"").toLowerCase());
        return name.includes(v)||addr.includes(v);
    });

    document.getElementById('list').innerHTML="";
    page=0;

    render();
}


// 엔터 검색
document.getElementById('search')
.addEventListener('keydown', e=>{
    if(e.key==="Enter") filter();
});


// 초기화
function reset(){
    view=data;
    document.getElementById('list').innerHTML="";
    page=0;
    document.getElementById('loading').innerText="스크롤하면 더 불러옵니다...";
    render();
}


// 내 주변 5km
async function nearby(){
    if(!user) await getLoc();
    if(!user) return;

    let filtered=data.map(r=>{
        const lat=parseFloat(r["위도"]);
        const lng=parseFloat(r["경도"]);
        const d=dist(user.lat,user.lng,lat,lng);
        return {...r,d};
    });

    filtered=filtered
        .filter(r=>r.d<=5)
        .sort((a,b)=>a.d-b.d);

    view=filtered;

    document.getElementById('list').innerHTML="";
    page=0;

    render();
}

</script>

</body>
</html>
